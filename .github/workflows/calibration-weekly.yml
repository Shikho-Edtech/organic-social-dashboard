name: Calibration Weekly Check

# 2026-05-05: replaces the manual `npm run calibration` cadence with a
# scheduled run that posts the report as a GitHub Issue every Monday
# morning BDT. The admin gets a notification, the issue is searchable
# history, and the rendering stays off the shared dashboard (per
# DECISIONS.md "Calibration KPI off the shared dashboard").
#
# What it does:
#   1. Runs `npm run calibration` against live Sheet data.
#   2. Captures the script's stdout.
#   3. Creates a GitHub issue titled "Weekly calibration check —
#      YYYY-MM-DD" with the captured output as a fenced code block.
#   4. Tags the issue `calibration-report` so all weekly reports are
#      filterable as a group.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - GOOGLE_SHEETS_CREDS_JSON: full service-account JSON
#   - GOOGLE_SPREADSHEET_ID: the data spreadsheet's ID
#
# Cron timing: `0 3 * * 1` = Monday 03:00 UTC = Monday 09:00 BDT (UTC+6).
# Adjust the hour if the team prefers a different morning slot.
#
# `workflow_dispatch` lets the admin re-run on demand from the Actions
# tab without waiting for next Monday.

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  calibration:
    name: weekly calibration check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run calibration check
        id: cal
        env:
          GOOGLE_SHEETS_CREDS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDS_JSON }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: |
          set -e
          # tsx fetched via npx on first run (same pattern as smoke tests).
          npm run calibration 2>&1 | tee calibration-report.txt
          # Compute the BDT date as the issue title for clarity.
          # Monday 03:00 UTC → Monday 09:00 BDT, same calendar date.
          DATE=$(date -u +%Y-%m-%d)
          echo "report_date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Create weekly issue with report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          DATE="${{ steps.cal.outputs.report_date }}"
          TITLE="Weekly calibration check — $DATE"

          # Compose body: the script's plain-text output inside a fenced
          # code block so the alignment + unicode (em-dash, percent) all
          # render cleanly.
          {
            echo "Auto-generated by .github/workflows/calibration-weekly.yml on $DATE."
            echo ""
            echo "Run \`npm run calibration\` locally to reproduce this report."
            echo ""
            echo '```text'
            cat calibration-report.txt
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "Close this issue when reviewed. New report appears next Monday at 09:00 BDT."
          } > issue-body.md

          # Ensure the label exists; idempotent (gh label create fails if
          # it already exists, but we swallow that case).
          gh label create "calibration-report" \
            --description "Auto-generated weekly calibration report" \
            --color "5319E7" 2>/dev/null || true

          gh issue create \
            --title "$TITLE" \
            --body-file issue-body.md \
            --label "calibration-report"

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: calibration-report-${{ steps.cal.outputs.report_date }}
          path: calibration-report.txt
          retention-days: 90
